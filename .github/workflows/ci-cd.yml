name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run lint -- --max-warnings=5

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gadgethive:latest
          cache-from: type=registry,ref=gadhive:buildcache
          cache-to: type=registry,ref=gadhive:buildcache,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gadgethive:${{ github.sha }}
          cache-from: type=registry,ref=gadhive:buildcache
          cache-to: type=registry,ref=gadhive:buildcache,mode=max
      - name: Build summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "Image: `gadgethive:${{ github.sha }}`" >> $GITHUB_STEP_SUMMARY
          echo "Status: Build successful" >> $GITHUB_STEP_SUMMARY
      - name: Verify Docker build runs
        run: |
          docker build -t gadhive-test -f Dockerfile .
          docker run --rm gadhive-test ls -la /usr/share/nginx/html/
      - name: Display build artifacts
        run: |
          docker run --rm gadhive-test find /usr/share/nginx/html -name "*.html" -o -name "*.js" -o -name "*.css" | head -20

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build final Docker image
        run: docker build -t gadgethive:deploy .
      - name: Test Docker Compose
        run: docker compose config
